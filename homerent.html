<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="บริการเช่าเว็บไซต์ - PanderX Rent Website">
    <title>บริการเช่าเว็บไซต์ | PanderX</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #38bdf8;
            --primary-dark: #0ea5e9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f3e8ff 50%, #f8fafc 100%);
            color: #1e293b;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .water-drop-bg {
            position: fixed;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            box-shadow: 
                inset 10px 20px 30px rgba(255, 255, 255, 0.9),
                inset -10px -20px 30px rgba(0, 0, 0, 0.02),
                15px 25px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            z-index: -1;
            animation: morph 8s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .drop-1 { width: 350px; height: 350px; top: -150px; right: -100px; }
        .drop-2 { width: 400px; height: 400px; bottom: -200px; left: -150px; animation-delay: -2s; }
        .drop-3 { width: 200px; height: 200px; top: 40%; right: 5%; animation-delay: -4s; opacity: 0.5; }

        @keyframes morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            50% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
            100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        }

        @media (max-width: 768px) {
            .water-drop-bg { animation-duration: 20s; opacity: 0.3; }
            .drop-1 { width: 200px; height: 200px; }
            .drop-2 { width: 250px; height: 250px; }
        }

        .glass-panel-white {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.7) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-top: 2px solid rgba(255, 255, 255, 1);
            border-left: 2px solid rgba(255, 255, 255, 1);
            border-radius: 24px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }

        .glass-card-white {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.8) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.08);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            position: relative;
        }

        .glass-card-white:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.15);
        }

        .navbar {
            position: sticky;
            top: 16px;
            z-index: 50;
            max-width: 1152px;
            margin: 0 auto 2.5rem;
            width: calc(100% - 2rem);
        }

        .avatar-glass {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(56, 189, 248, 0.3);
            flex-shrink: 0;
        }

        .balance-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, rgba(129, 140, 248, 0.1) 100%);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 20px;
            font-size: 12px;
            color: #0284c7;
            font-weight: 600;
            white-space: nowrap;
        }

        .btn-liquid {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            color: white;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
            transition: all 0.3s ease;
        }

        .btn-liquid:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
        }

        .btn-glass-outline {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            color: #475569;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 100px;
            transition: all 0.3s;
        }

        .btn-glass-outline:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #0ea5e9;
        }

        .search-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .search-glass:focus-within {
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .gradient-text {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Admin Panel Styles - Glass Version */
        .admin-panel-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.85) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(14, 165, 233, 0.15);
            overflow: hidden;
        }

        .admin-input-glass {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 14px;
            transition: all 0.3s;
            width: 100%;
        }

        .admin-input-glass:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .btn-save-glass {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 12px 32px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-save-glass:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .btn-admin-toggle {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 10px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .btn-admin-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
        }

        .plan-editor-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .package-image-container {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.05) 0%, rgba(129, 140, 248, 0.05) 100%);
            border: 2px dashed rgba(56, 189, 248, 0.2);
        }

        .package-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .glass-card-white:hover .package-image-container img {
            transform: scale(1.05);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 200;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 4px solid;
            max-width: 90vw;
        }

        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        .toast.info { border-left-color: #38bdf8; }

        .hidden { display: none !important; }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>

    <script type="module">
        import { auth, db, isTenantAdmin } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let currentUser = null;
        let isAdmin = false;
        let plansData = [];
        let editingPlans = [];
        let isAdminPanelOpen = false;

        // ค่าเริ่มต้น
        const defaultPlans = [
            {
                id: 'singularity_v1',
                name: 'Singularity V1',
                price: 139,
                period: '30 วัน',
                imageUrl: 'https://placehold.co/600x400/e0f2fe/0284c7?text=Singularity+V1',
                features: ['50 สินค้า', '2 Staff', '500MB Storage'],
                isActive: true,
                order: 1
            },
            {
                id: 'singularity_v1_extended',
                name: 'Singularity V1 Extended',
                price: 199,
                period: '30 วัน',
                imageUrl: 'https://placehold.co/600x400/e0e7ff/4338ca?text=Singularity+V1+Extended',
                features: ['500 สินค้า', '10 Staff', '5GB Storage', 'Custom Domain + API'],
                isActive: true,
                order: 2,
                isRecommended: true
            }
        ];

        const elements = {
            authLoading: document.getElementById('authLoading'),
            guestButtons: document.getElementById('guestButtons'),
            userProfile: document.getElementById('userProfile'),
            displayName: document.getElementById('displayName'),
            userBalance: document.getElementById('userBalance'),
            userAvatar: document.getElementById('userAvatar'),
            plansContainer: document.getElementById('plansContainer'),
            adminPanel: document.getElementById('adminPanel'),
            adminToggle: document.getElementById('adminToggle'),
            plansEditor: document.getElementById('plansEditor')
        };

        // Auth State
        onAuthStateChanged(auth, async (user) => {
            if (elements.authLoading) elements.authLoading.classList.add('hidden');
            currentUser = user;

            if (user) {
                const username = user.displayName || (user.email && user.email.split('@')[0]) || 'User';
                elements.displayName.textContent = username;
                elements.userAvatar.textContent = username.charAt(0).toUpperCase();
                elements.guestButtons.classList.add('hidden');
                elements.userProfile.classList.remove('hidden');

                try {
                    isAdmin = await isTenantAdmin();
                    if (isAdmin) {
                        elements.adminToggle.classList.remove('hidden');
                    }
                } catch (e) {
                    console.log('Error checking admin:', e);
                }
            } else {
                elements.guestButtons.classList.remove('hidden');
                elements.userProfile.classList.add('hidden');
            }

            loadPlans();
        });

        // โหลดข้อมูลแบบ Real-time
        function loadPlans() {
            const plansRef = doc(db, 'website_config', 'rental_plans');
            
            onSnapshot(plansRef, (docSnap) => {
                if (docSnap.exists()) {
                    plansData = docSnap.data().plans || defaultPlans;
                } else {
                    plansData = [...defaultPlans];
                    savePlansToFirestore(plansData);
                }
                renderPlans();
                if (isAdmin && isAdminPanelOpen) renderAdminEditor();
            }, (error) => {
                console.error('Error loading plans:', error);
                plansData = [...defaultPlans];
                renderPlans();
            });
        }

        // แสดงผลแพ็คเกจ
        function renderPlans(filterText = '') {
            const container = elements.plansContainer;
            container.innerHTML = '';

            const filteredPlans = plansData
                .filter(p => p.isActive && (p.name.toLowerCase().includes(filterText.toLowerCase()) || 
                       p.price.toString().includes(filterText)))
                .sort((a, b) => (a.order || 0) - (b.order || 0));

            if (filteredPlans.length === 0) {
                container.innerHTML = '<div class="col-span-2 text-center py-10 text-slate-400 glass-card-white">ไม่พบแพ็คเกจที่ค้นหา</div>';
                return;
            }

            filteredPlans.forEach(plan => {
                const card = document.createElement('article');
                card.className = 'glass-card-white p-6 website-card relative';
                card.setAttribute('data-name', plan.name);
                
                const recommendedBadge = plan.isRecommended ? `
                    <div class="absolute top-4 right-4 z-20">
                        <span class="bg-gradient-to-r from-sky-400 to-indigo-500 text-white text-xs px-3 py-1.5 rounded-full font-bold shadow-lg">แนะนำ</span>
                    </div>
                ` : '';

                const priceColor = plan.isRecommended ? 'text-indigo-600' : 'text-sky-600';
                const btnStyle = plan.isRecommended 
                    ? 'background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%); color: #4338ca; border: 2px solid rgba(99, 102, 241, 0.2);' 
                    : '';

                card.innerHTML = `
                    ${recommendedBadge}
                    <div class="package-image-container" style="${plan.isRecommended ? 'background: linear-gradient(135deg, rgba(56, 189, 248, 0.05) 0%, rgba(99, 102, 241, 0.05) 100%); border-color: rgba(56, 189, 248, 0.2);' : ''}">
                        <img src="${plan.imageUrl}" alt="${plan.name}" onerror="this.src='https://placehold.co/600x400/e2e8f0/64748b?text=No+Image'">
                    </div>
                    
                    <div class="text-center relative z-10">
                        <h3 class="text-xl font-bold text-slate-800 mb-1">${plan.name}</h3>
                        <p class="text-xs text-slate-500 mb-4">ระบบร้านค้าออนไลน์</p>
                        
                        ${plan.features ? `
                            <ul class="text-left text-sm text-slate-600 mb-5 space-y-2 px-2">
                                ${plan.features.map(f => `
                                    <li class="flex items-center gap-2">
                                        <svg class="w-4 h-4 ${plan.isRecommended ? 'text-indigo-500' : 'text-sky-500'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                                        ${f}
                                    </li>
                                `).join('')}
                            </ul>
                        ` : ''}

                        <div class="flex items-center justify-between px-2">
                            <div class="text-left">
                                <span class="${priceColor} font-bold text-2xl">${plan.price}</span>
                                <span class="text-sm text-slate-400">฿ / ${plan.period}</span>
                            </div>
                            <button onclick="rentWebsite('${plan.id}', '${plan.name}', ${plan.price})" 
                                class="btn-liquid px-6 py-2 text-sm font-medium" 
                                style="${btnStyle}">
                                เช่าเลย
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Render Admin Editor
        function renderAdminEditor() {
            const editor = elements.plansEditor;
            editor.innerHTML = '';
            editingPlans = JSON.parse(JSON.stringify(plansData));

            editingPlans.forEach((plan, index) => {
                const planEditor = document.createElement('div');
                planEditor.className = 'plan-editor-card';
                planEditor.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-slate-700">แพ็คเกจ #${index + 1}</h3>
                        <button onclick="removePlan(${index})" class="text-red-400 hover:text-red-600 text-sm">ลบ</button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <label class="text-xs font-semibold text-slate-500 mb-1 block">URL รูปภาพ</label>
                            <input type="text" class="admin-input-glass" value="${plan.imageUrl}" 
                                onchange="updatePlanField(${index}, 'imageUrl', this.value)" placeholder="https://...">
                            <div class="mt-2 flex items-center gap-3">
                                <img src="${plan.imageUrl}" class="w-16 h-16 object-cover rounded-lg border border-slate-200" 
                                    onerror="this.style.display='none'" onload="this.style.display='block'">
                                <span class="text-xs text-slate-400">แนะนำขนาด 600x400px</span>
                            </div>
                        </div>
                        
                        <div>
                            <label class="text-xs font-semibold text-slate-500 mb-1 block">ชื่อแพ็คเกจ</label>
                            <input type="text" class="admin-input-glass" value="${plan.name}" 
                                onchange="updatePlanField(${index}, 'name', this.value)">
                        </div>
                        
                        <div>
                            <label class="text-xs font-semibold text-slate-500 mb-1 block">ราคา (บาท)</label>
                            <input type="number" class="admin-input-glass" value="${plan.price}" step="0.01"
                                onchange="updatePlanField(${index}, 'price', parseFloat(this.value))">
                        </div>
                        
                        <div>
                            <label class="text-xs font-semibold text-slate-500 mb-1 block">ระยะเวลา</label>
                            <input type="text" class="admin-input-glass" value="${plan.period}" 
                                onchange="updatePlanField(${index}, 'period', this.value)" placeholder="30 วัน">
                        </div>
                        
                        <div>
                            <label class="text-xs font-semibold text-slate-500 mb-1 block">ลำดับ</label>
                            <input type="number" class="admin-input-glass" value="${plan.order || index + 1}" 
                                onchange="updatePlanField(${index}, 'order', parseInt(this.value))">
                        </div>
                        
                        <div class="md:col-span-2">
                            <label class="text-xs font-semibold text-slate-500 mb-1 block">Features (คั่นด้วย comma)</label>
                            <input type="text" class="admin-input-glass" value="${plan.features ? plan.features.join(', ') : ''}" 
                                onchange="updatePlanField(${index}, 'features', this.value.split(',').map(s => s.trim()).filter(s => s))" 
                                placeholder="50 สินค้า, 2 Staff, 500MB">
                        </div>
                        
                        <div class="md:col-span-2 flex items-center gap-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" ${plan.isActive ? 'checked' : ''} 
                                    onchange="updatePlanField(${index}, 'isActive', this.checked)"
                                    class="w-4 h-4 text-sky-500 rounded focus:ring-sky-400">
                                <span class="text-sm text-slate-700">แสดงแพ็คเกจนี้</span>
                            </label>
                            
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" ${plan.isRecommended ? 'checked' : ''} 
                                    onchange="updatePlanField(${index}, 'isRecommended', this.checked)"
                                    class="w-4 h-4 text-indigo-500 rounded focus:ring-indigo-400">
                                <span class="text-sm text-slate-700">แนะนำ (Recommended)</span>
                            </label>
                        </div>
                    </div>
                `;
                editor.appendChild(planEditor);
            });
        }

        // Update plan field
        window.updatePlanField = function(index, field, value) {
            editingPlans[index][field] = value;
        };

        // Add new plan
        window.addNewPlan = function() {
            editingPlans.push({
                id: 'plan_' + Date.now(),
                name: 'แพ็คเกจใหม่',
                price: 0,
                period: '30 วัน',
                imageUrl: 'https://placehold.co/600x400/e2e8f0/64748b?text=New+Plan',
                features: [],
                isActive: true,
                isRecommended: false,
                order: editingPlans.length + 1
            });
            renderAdminEditor();
            // Scroll to bottom
            setTimeout(() => {
                elements.plansEditor.scrollTop = elements.plansEditor.scrollHeight;
            }, 100);
        };

        // Remove plan
        window.removePlan = function(index) {
            if (confirm('ต้องการลบแพ็คเกจนี้?')) {
                editingPlans.splice(index, 1);
                renderAdminEditor();
            }
        };

        // Save all plans
        window.saveAllPlans = async function() {
            try {
                editingPlans.sort((a, b) => (a.order || 0) - (b.order || 0));
                await savePlansToFirestore(editingPlans);
                showToast('บันทึกการเปลี่ยนแปลงสำเร็จ', 'success');
            } catch (error) {
                console.error('Error saving:', error);
                showToast('เกิดข้อผิดพลาดในการบันทึก', 'error');
            }
        };

        // Save to Firestore
        async function savePlansToFirestore(plans) {
            const plansRef = doc(db, 'website_config', 'rental_plans');
            await setDoc(plansRef, { 
                plans: plans,
                updatedAt: new Date().toISOString(),
                updatedBy: currentUser ? currentUser.uid : 'system'
            });
        }

        // Toggle Admin Panel
        window.toggleAdminPanel = function() {
            isAdminPanelOpen = !isAdminPanelOpen;
            if (isAdminPanelOpen) {
                elements.adminPanel.classList.remove('hidden');
                elements.adminToggle.classList.add('hidden');
                renderAdminEditor();
            } else {
                elements.adminPanel.classList.add('hidden');
                elements.adminToggle.classList.remove('hidden');
            }
        };

        // Rent Website
        window.rentWebsite = function(planId, planName, price) {
            if (!currentUser) {
                showToast('กรุณาเข้าสู่ระบบก่อนเช่าเว็บไซต์', 'error');
                setTimeout(() => window.location.href = './login.html', 1500);
                return;
            }
            
            const params = new URLSearchParams({
                planId: planId,
                package: planName,
                price: price
            });
            window.location.href = './rent-website.html?' + params.toString();
        };

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderPlans(e.target.value);
        });

        // Logout
        window.handleLogout = async function() {
            try {
                await signOut(auth);
                showToast('ออกจากระบบสำเร็จ', 'success');
                setTimeout(() => window.location.reload(), 1000);
            } catch (error) {
                showToast('เกิดข้อผิดพลาด', 'error');
            }
        };

        // Navigation
        window.goToLogin = () => window.location.href = './login.html';
        window.goToRegister = () => window.location.href = './login.html?mode=register';

        // Toast
        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            const colors = { success: 'text-green-500', error: 'text-red-500', info: 'text-sky-500' };
            
            toast.innerHTML = `<span class="text-xl ${colors[type]}">${icons[type]}</span><span class="font-medium text-slate-700">${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        };
    </script>
</body>
</html>
