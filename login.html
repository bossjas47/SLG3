<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เข้าสู่ระบบ | PanderX</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f3e8ff 50%, #f8fafc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
            animation: float 10s infinite ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #f472b6 0%, #a78bfa 100%);
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .glass-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.4) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-top: 2px solid rgba(255, 255, 255, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.5);
            border-radius: 2rem;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 1rem;
            font-size: 1rem;
            font-family: 'Prompt', sans-serif;
            color: #1e293b;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .input-field.error {
            border-color: #ef4444;
            background: rgba(254, 226, 226, 0.5);
            animation: shake 0.5s ease-in-out;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
        }

        .input-field:focus + .input-icon {
            color: #38bdf8;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 0.5rem;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Prompt', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-primary.loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .error-message {
            color: #dc2626;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            align-items: center;
            gap: 0.25rem;
        }

        .error-message.show {
            display: flex;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(400px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            border-left: 4px solid;
            max-width: 90vw;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        .toast.warning { border-left-color: #f59e0b; }

        @media (max-width: 480px) {
            .glass-container {
                padding: 2rem 1.5rem;
            }
            .blob {
                opacity: 0.4;
            }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-container">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-sky-400 to-indigo-500 mb-4 shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-sky-500 to-indigo-500 mb-2">
                PanderX
            </h1>
            <p class="text-slate-500 text-sm" id="subtitle">เข้าสู่ระบบด้วยชื่อผู้ใช้</p>
        </div>

        <form id="authForm" novalidate>
            
            <!-- Username Field -->
            <div class="input-group">
                <input 
                    type="text" 
                    id="username" 
                    class="input-field" 
                    placeholder="ชื่อผู้ใช้"
                    autocomplete="username"
                    required
                    pattern="[a-zA-Z0-9_]{3,20}"
                    title="3-20 ตัวอักษร เฉพาะ a-z, 0-9 และ _"
                >
                <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                <div class="error-message" id="usernameError">
                    ชื่อผู้ใช้ต้องมี 3-20 ตัวอักษร (a-z, 0-9, _)
                </div>
            </div>

            <!-- Password Field -->
            <div class="input-group">
                <input 
                    type="password" 
                    id="password" 
                    class="input-field" 
                    placeholder="รหัสผ่าน"
                    required
                    minlength="6"
                    autocomplete="current-password"
                >
                <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
                <button type="button" class="password-toggle" id="togglePassword">
                    <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                </button>
                <div class="error-message" id="passwordError">
                    รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร
                </div>
            </div>

            <!-- Confirm Password (Register Only) -->
            <div class="input-group hidden" id="confirmGroup">
                <input 
                    type="password" 
                    id="confirmPassword" 
                    class="input-field" 
                    placeholder="ยืนยันรหัสผ่าน"
                    autocomplete="new-password"
                >
                <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <div class="error-message" id="confirmError">
                    รหัสผ่านไม่ตรงกัน
                </div>
            </div>

            <!-- Options -->
            <div class="flex items-center justify-between mb-6" id="loginOptions">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-gray-300 text-sky-600 focus:ring-sky-500">
                    <span class="text-sm text-slate-600">จดจำฉัน</span>
                </label>
                <a href="#" class="text-sm text-sky-600 hover:underline" onclick="forgotPassword(); return false;">ลืมรหัสผ่าน?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="btn-primary">
                <span id="btnText">เข้าสู่ระบบ</span>
            </button>

            <!-- Toggle Mode -->
            <div class="mt-6 text-center">
                <span class="text-slate-500 text-sm" id="toggleText">ยังไม่มีบัญชี?</span>
                <button type="button" id="toggleMode" class="text-sky-600 font-semibold text-sm hover:underline ml-1">
                    สมัครสมาชิก
                </button>
            </div>

            <!-- Back Link -->
            <div class="mt-4 text-center">
                <a href="./index.html" class="inline-flex items-center gap-1 text-slate-400 hover:text-slate-600 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    กลับไปหน้าแรก
                </a>
            </div>
        </form>
    </div>

    <!-- Firebase Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword,
            updateProfile,
            deleteUser,
            browserLocalPersistence,
            browserSessionPersistence,
            setPersistence,
            onAuthStateChanged,
            sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            getDoc, 
            updateDoc, 
            collection, 
            addDoc,
            serverTimestamp,
            increment 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC450kePwL6FdVXUSVli0bEP3DdnQs0qzU",
            authDomain: "psl-esport.firebaseapp.com",
            projectId: "psl-esport",
            storageBucket: "psl-esport.firebasestorage.app",
            messagingSenderId: "225108570173",
            appId: "1:225108570173:web:b6483c02368908f3783a54"
        };

        // Initialize
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const USERNAME_DOMAIN = '@panderx.user';
        
        function usernameToEmail(username) {
            return username.toLowerCase() + USERNAME_DOMAIN;
        }

        function emailToUsername(email) {
            return email.replace(USERNAME_DOMAIN, '');
        }

        // State
        let isLogin = true;
        let currentUser = null; // เก็บ user ที่กำลังสมัครไว้กรณีต้อง rollback
        
        // Elements
        const form = document.getElementById('authForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const confirmGroup = document.getElementById('confirmGroup');
        const loginOptions = document.getElementById('loginOptions');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const toggleMode = document.getElementById('toggleMode');
        const toggleText = document.getElementById('toggleText');
        const subtitle = document.getElementById('subtitle');

        // ============================================
        // 🔧 SYSTEM: Auto-fix & Sync Check
        // ============================================
        
        // ตรวจสอบทุกครั้งที่มีการเปลี่ยนแปลงสถานะการเข้าสู่ระบบ
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log('🔍 Auth State Changed: User logged in', user.uid);
                
                try {
                    // 🔧 ตรวจสอบว่ามีข้อมูลใน Firestore หรือไม่
                    const userRef = doc(db, 'users', user.uid);
                    const userSnap = await getDoc(userRef);
                    
                    if (!userSnap.exists()) {
                        // ⚠️ ไม่พบข้อมูลใน Firestore! (Ghost User)
                        console.warn('⚠️ Ghost User detected! Creating Firestore data...');
                        
                        const username = user.displayName || emailToUsername(user.email);
                        
                        await setDoc(userRef, {
                            uid: user.uid,
                            username: username,
                            email: user.email,
                            displayName: username,
                            role: 'user',
                            type: 'user',
                            createdAt: serverTimestamp(),
                            lastLogin: serverTimestamp(),
                            lastSeen: serverTimestamp(),
                            loginCount: 1,
                            isAdmin: false,
                            isBanned: false,
                            status: 'online',
                            balance: 0,
                            ipAddress: await getIPAddress(),
                            userAgent: navigator.userAgent,
                            provider: 'password',
                            ghostFixed: true // 标记这是修复的数据
                        });
                        
                        console.log('✅ Ghost User fixed successfully');
                        showToast('ซ่อมแซมข้อมูลผู้ใช้สำเร็จ', 'success');
                    } else {
                        // อัพเดทข้อมูลการใช้งานล่าสุด
                        await updateDoc(userRef, {
                            lastSeen: serverTimestamp(),
                            status: 'online',
                            loginCount: increment(1)
                        });
                    }
                    
                    // รอสักครู่แล้ว redirect
                    showToast('เข้าสู่ระบบสำเร็จ!', 'success');
                    setTimeout(() => {
                        window.location.href = './index.html';
                    }, 1000);
                    
                } catch (error) {
                    console.error('❌ Error in auth state handler:', error);
                    showToast('เข้าสู่ระบบได้แต่มีปัญหาในการซิงค์ข้อมูล', 'warning');
                }
            }
        });

        // Toggle Mode
        toggleMode.addEventListener('click', () => {
            isLogin = !isLogin;
            
            subtitle.textContent = isLogin ? 'เข้าสู่ระบบด้วยชื่อผู้ใช้' : 'สร้างบัญชีใหม่';
            toggleText.textContent = isLogin ? 'ยังไม่มีบัญชี?' : 'มีบัญชีอยู่แล้ว?';
            toggleMode.textContent = isLogin ? 'สมัครสมาชิก' : 'เข้าสู่ระบบ';
            btnText.textContent = isLogin ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
            
            confirmGroup.classList.toggle('hidden', isLogin);
            loginOptions.classList.toggle('hidden', !isLogin);
            
            document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.input-field').forEach(el => el.classList.remove('error'));
        });

        // Toggle Password
        document.getElementById('togglePassword').addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });

        // ดึง IP
        async function getIPAddress() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) {
                return 'unknown';
            }
        }

        // ============================================
        // 🔧 CORE: Save User with Rollback Protection
        // ============================================
        async function saveUserToFirestore(user, username) {
            const userRef = doc(db, 'users', user.uid);
            let retryCount = 0;
            const maxRetries = 3;
            
            while (retryCount < maxRetries) {
                try {
                    console.log(`📝 Attempt ${retryCount + 1}: Saving user to Firestore...`);
                    
                    const userData = {
                        uid: user.uid,
                        username: username,
                        email: user.email,
                        displayName: username,
                        role: 'user',
                        type: 'user',
                        createdAt: serverTimestamp(),
                        lastLogin: serverTimestamp(),
                        lastSeen: serverTimestamp(),
                        loginCount: 1,
                        isAdmin: false,
                        isBanned: false,
                        status: 'online',
                        balance: 0,
                        ipAddress: await getIPAddress(),
                        userAgent: navigator.userAgent,
                        provider: 'password'
                    };
                    
                    await setDoc(userRef, userData);
                    
                    // Verify ว่าบันทึกจริง
                    await new Promise(resolve => setTimeout(resolve, 500)); // รอ 500ms ให้ Firestore commit
                    const verifySnap = await getDoc(userRef);
                    
                    if (verifySnap.exists()) {
                        console.log('✅ Firestore save verified successfully');
                        return { success: true };
                    } else {
                        throw new Error('VERIFY_FAILED');
                    }
                    
                } catch (error) {
                    retryCount++;
                    console.error(`❌ Attempt ${retryCount} failed:`, error);
                    
                    if (retryCount >= maxRetries) {
                        // ทดลองครบแล้วยังไม่ได้ -> Rollback
                        console.error('🗑️ Max retries reached. Rolling back Auth user...');
                        
                        try {
                            await deleteUser(user);
                            console.log('✅ Auth user deleted (Rollback successful)');
                        } catch (deleteError) {
                            console.error('❌ Failed to delete Auth user:', deleteError);
                        }
                        
                        throw new Error(
                            error.code === 'permission-denied' 
                            ? 'ไม่มีสิทธิ์บันทึกข้อมูล (Firestore Rules) - บัญชีถูกยกเลิกแล้ว กรุณาติดต่อแอดมิน' 
                            : 'ไม่สามารถบันทึกข้อมูลได้ - บัญชีถูกยกเลิกแล้ว'
                        );
                    }
                    
                    // รอก่อน retry
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }
        }

        // บันทึก Log
        async function logUserActivity(userId, username, action) {
            try {
                await addDoc(collection(db, 'logs'), {
                    userId, username, action,
                    timestamp: serverTimestamp(),
                    ipAddress: await getIPAddress(),
                    userAgent: navigator.userAgent
                });
            } catch (e) {
                console.log('Log skipped:', e);
            }
        }

        // ลืมรหัสผ่าน
        window.forgotPassword = async function() {
            const username = prompt('กรุณากรอกชื่อผู้ใช้ของคุณ:');
            if (!username) return;
            
            try {
                await sendPasswordResetEmail(auth, usernameToEmail(username));
                showToast('ส่งลิงก์รีเซ็ตรหัสผ่านแล้ว', 'success');
            } catch (error) {
                showToast('ไม่พบบัญชีผู้ใช้นี้', 'error');
            }
        };

        // ============================================
        // 🚀 MAIN: Form Submit Handler
        // ============================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim().toLowerCase();
            const password = passwordInput.value;
            const confirmPass = confirmInput.value;
            
            // Validation
            document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.input-field').forEach(el => el.classList.remove('error'));
            
            let hasError = false;
            
            if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
                document.getElementById('usernameError').classList.add('show');
                usernameInput.classList.add('error');
                hasError = true;
            }
            
            if (password.length < 6) {
                document.getElementById('passwordError').classList.add('show');
                passwordInput.classList.add('error');
                hasError = true;
            }
            
            if (!isLogin && password !== confirmPass) {
                document.getElementById('confirmError').classList.add('show');
                confirmInput.classList.add('error');
                hasError = true;
            }
            
            if (hasError) return;
            
            // Loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            btnText.textContent = isLogin ? 'กำลังเข้าสู่ระบบ...' : 'กำลังสมัคร...';
            
            try {
                const fakeEmail = usernameToEmail(username);
                const rememberMe = document.getElementById('rememberMe').checked;
                
                if (isLogin) {
                    // ==========================================
                    // LOGIN FLOW (with auto-fix)
                    // ==========================================
                    await setPersistence(auth, rememberMe ? browserLocalPersistence : browserSessionPersistence);
                    await signInWithEmailAndPassword(auth, fakeEmail, password);
                    // onAuthStateChanged จะจัดการต่อ (รวมถึง auto-fix ถ้าข้อมูลหาย)
                    
                } else {
                    // ==========================================
                    // REGISTER FLOW (with rollback)
                    // ==========================================
                    console.log('🚀 Starting registration for:', username);
                    
                    // 1. สร้าง Auth
                    const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, password);
                    console.log('✅ Auth created:', userCredential.user.uid);
                    
                    // 2. อัพเดท Profile
                    await updateProfile(userCredential.user, { displayName: username });
                    
                    // 3. บันทึก Firestore (with rollback on failure)
                    try {
                        await saveUserToFirestore(userCredential.user, username);
                        console.log('✅ Registration complete');
                        
                        // บันทึก Log (ไม่สำคัญมาก ถ้า fail ไม่เป็นไร)
                        await logUserActivity(userCredential.user.uid, username, 'register');
                        
                        // Success - onAuthStateChanged จะจัดการ redirect
                        
                    } catch (firestoreError) {
                        // Rollback เกิดขึ้นแล้วใน saveUserToFirestore
                        console.error('❌ Registration failed:', firestoreError);
                        showToast(firestoreError.message, 'error');
                        
                        // Reset form
                        submitBtn.disabled = false;
                        submitBtn.classList.remove('loading');
                        btnText.textContent = 'สมัครสมาชิก';
                        return; // ไม่ redirect
                    }
                }
                
            } catch (error) {
                console.error('❌ Auth Error:', error);
                let message = 'เกิดข้อผิดพลาด';
                
                switch(error.code) {
                    case 'auth/user-not-found':
                        message = 'ไม่พบชื่อผู้ใช้นี้';
                        usernameInput.classList.add('error');
                        break;
                    case 'auth/wrong-password':
                        message = 'รหัสผ่านไม่ถูกต้อง';
                        passwordInput.classList.add('error');
                        break;
                    case 'auth/email-already-in-use':
                        message = 'ชื่อผู้ใช้นี้ถูกใช้แล้ว';
                        usernameInput.classList.add('error');
                        break;
                    case 'auth/weak-password':
                        message = 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';
                        passwordInput.classList.add('error');
                        break;
                    case 'auth/too-many-requests':
                        message = 'กรุณารอสักครู่ คุณพยายามหลายครั้งเกินไป';
                        break;
                    case 'auth/network-request-failed':
                        message = 'ไม่สามารถเชื่อมต่ออินเทอร์เน็ตได้';
                        break;
                    default:
                        message = error.message || 'เกิดข้อผิดพลาดไม่ทราบสาเหตุ';
                }
                
                showToast(message, 'error');
                
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                btnText.textContent = isLogin ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
            }
        });

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icons = {
                success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>',
                error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>',
                warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>'
            };
            
            toast.innerHTML = `
                <svg class="w-5 h-5 ${type === 'success' ? 'text-emerald-500' : type === 'warning' ? 'text-amber-500' : 'text-red-500'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${icons[type] || icons.error}
                </svg>
                <span class="text-sm font-medium text-slate-700">${message}</span>
            `;
            
            document.body.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, type === 'error' ? 5000 : 3000);
        }
        
        window.showToast = showToast;
    </script>
</body>
</html>
